<header class="mrd-navbar p-component">
  <div class="mrd-navbar__inner">
    <!-- Brand -->
    <a routerLink="/" class="mrd-navbar__brand" aria-label="Mr D Twice – Home">
      <!-- Logo >>> DA MODIFICARE -->
      <svg
        class="mrd-navbar__logo-img"
        viewBox="0 0 32 32"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path d="M6 6 L16 4 L26 6 L26 26 L6 26 Z" fill="currentColor" opacity="0.15" />
        <path
          d="M6 6 L16 4 L26 6"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path d="M10 12 L16 10 L22 12 L22 24 L10 24 Z" fill="currentColor" opacity="0.8" />
      </svg>
      <span class="mrd-navbar__brand-name">Mr D Twice</span>
    </a>

    <!-- Desktop Nav Links -->
    <nav class="mrd-navbar__nav" aria-label="Navigazione principale">
      <a
        routerLink="/"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="mrd-navbar__link"
      >
        <!-- Icona >>> DA MODIFICARE -->
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Home
      </a>

      <a routerLink="/regioni" routerLinkActive="is-active" class="mrd-navbar__link">
        <!-- Icona >>> DA MODIFICARE -->
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="10" r="3" />
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
        </svg>
        Regioni
      </a>

      <a routerLink="/chi-siamo" routerLinkActive="is-active" class="mrd-navbar__link">
        <!-- Icona >>> DA MODIFICARE -->
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" />
        </svg>
        Chi siamo
      </a>
    </nav>

    <!-- ── Mobile Settings ──────────────────────────────────────────────────────────── -->

    <!-- CTA Button — usa p-button direttamente, il tema Aura applica i token primary -->
    <div class="mrd-navbar__actions">
      <p-button label="+ Aggiungi" routerLink="/aggiungi" size="small" />
    </div>

    <!-- Mobile hamburger -->
    <button
      class="mrd-navbar__hamburger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-controls="mrd-mobile-menu"
      aria-label="Apri menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div
    id="mrd-mobile-menu"
    class="mrd-navbar__mobile-menu"
    [class.is-open]="menuOpen"
    role="navigation"
    aria-label="Menu mobile"
  >
    <a routerLink="/" (click)="menuOpen = false" class="mrd-navbar__mobile-link">Home</a>
    <a routerLink="/regioni" (click)="menuOpen = false" class="mrd-navbar__mobile-link">Regioni</a>
    <a routerLink="/chi-siamo" (click)="menuOpen = false" class="mrd-navbar__mobile-link"
      >Chi siamo</a
    >
    <a routerLink="/aggiungi" (click)="menuOpen = false" class="mrd-navbar__mobile-cta"
      >+ Aggiungi</a
    >
  </div>
</header>
