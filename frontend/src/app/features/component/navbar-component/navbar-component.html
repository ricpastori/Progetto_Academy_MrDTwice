<header class="mrd-navbar p-component">
  <div class="mrd-navbar__inner">
    <!-- Brand -->
    <a routerLink="/" class="mrd-navbar__brand" aria-label="Mr D Twice – Home">
      <img
        class="mrd-navbar__logo-img"
        src="/images/origin/logo.svg"
        aria-hidden="true"
        alt="Logo Mr D Twice"
      />
      <span class="mrd-navbar__brand-name">Mr D Twice</span>
    </a>

    <!-- Navigazione desktop PrimeNG -->
    <p-tabs class="mrd-navbar__tabs" [value]="activeTab()" [showNavigators]="false">
      <p-tablist aria-label="Navigazione principale">
        @for (item of navigationItems; track item.route) {
          <p-tab [value]="item.route" [routerLink]="item.route">
            <i [class]="item.icon" aria-hidden="true"></i>
            <span>{{ item.label }}</span>
          </p-tab>
        }
      </p-tablist>
    </p-tabs>

    <!-- ── Mobile Settings ──────────────────────────────────────────────────────────── -->

    <!-- CTA Button — usa p-button direttamente, il tema Aura applica i token primary -->
    <div class="mrd-navbar__actions">
      <p-button label="+ Aggiungi" (onClick)="apriModaleNuovoLuogo()" size="small"></p-button>
    </div>

    <!-- Mobile hamburger -->
    <button
      class="mrd-navbar__hamburger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-controls="mrd-mobile-menu"
      [attr.aria-label]="menuOpen ? 'Chiudi menu' : 'Apri menu'"
      [pTooltip]="menuOpen ? 'Chiudi menu' : 'Apri menu'"
      tooltipPosition="bottom"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div
    id="mrd-mobile-menu"
    class="mrd-navbar__mobile-menu"
    [class.is-open]="menuOpen"
    role="navigation"
    aria-label="Menu mobile"
  >
    <a routerLink="/" (click)="menuOpen = false" class="mrd-navbar__mobile-link">Home</a>
    <a routerLink="/regioni" (click)="menuOpen = false" class="mrd-navbar__mobile-link">Regioni</a>
    <a routerLink="/chi-siamo" (click)="menuOpen = false" class="mrd-navbar__mobile-link"
      >Chi siamo</a
    >

    <button
      (click)="apriModaleNuovoLuogo(); menuOpen = false"
      class="mrd-navbar__mobile-cta"
      style="border: none; text-align: left; cursor: pointer"
    >
      + Aggiungi
    </button>
  </div>
</header>
