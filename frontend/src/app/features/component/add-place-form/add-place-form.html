<form [formGroup]="placeForm" (ngSubmit)="onSubmit()" class="add-place-form">
  <div class="form-group">
    <label for="placeId">Titolo <span class="required-asterisk">*</span></label>
    <input
      pInputText
      id="placeId"
      formControlName="place"
      placeholder="es. Fontana di Trevi"
      [fluid]="true"
    />
  </div>

  <div class="form-group">
    <span id="categoryLabel" class="form-label-title">
      Categoria <span class="required-asterisk">*</span>
    </span>

    <div class="category-selection">
      <p-selectbutton
        [options]="tagService.tags()"
        optionLabel="name"
        optionValue="id"
        formControlName="tag_id"
        [allowEmpty]="false"
        ariaLabelledBy="categoryLabel"
        styleClass="category-option"
        (onChange)="selectCategory($event.value)"
      >
        <ng-template #item let-category>
          <span class="category-option-content">
            <span class="category-indicator" aria-hidden="true"></span>
            @switch (category.name) {
              @case ('Natura') {
                <i class="ph ph-leaf category-icon category-icon--nature" aria-hidden="true"></i>
              }
              @case ('Cibo') {
                <i
                  class="ph ph-fork-knife category-icon category-icon--food"
                  aria-hidden="true"
                ></i>
              }
              @case ('Cultura') {
                <i
                  class="ph ph-palette category-icon category-icon--culture"
                  aria-hidden="true"
                ></i>
              }
              @default {
                <i
                  class="ph ph-bank category-icon category-icon--attraction"
                  aria-hidden="true"
                ></i>
              }
            }
            <span>{{ category.name }}</span>
          </span>
        </ng-template>
      </p-selectbutton>
    </div>
  </div>

  <div class="form-group">
    <label for="subCategoryId"> Sotto-categoria <span class="required-asterisk">*</span> </label>
    <p-select
      inputId="subCategoryId"
      [options]="filteredSubTags()"
      formControlName="sub_tag_id"
      [placeholder]="
        selectedTagId() ? 'Seleziona una sotto-categoria' : 'Scegli prima una categoria'
      "
      optionLabel="name"
      optionValue="id"
      [fluid]="true"
      appendTo="body"
      panelStyleClass="add-place-select-overlay"
      [overlayOptions]="{ autoZIndex: true, baseZIndex: 4000 }"
    ></p-select>
  </div>

  <div class="form-row-grid-2">
    <div class="form-group">
      <label for="regionId">Regione <span class="required-asterisk">*</span></label>
      <p-select
        inputId="regionId"
        [options]="regionService.regions()"
        formControlName="region_id"
        placeholder="Seleziona regione"
        optionLabel="name"
        optionValue="id"
        [fluid]="true"
        appendTo="body"
        panelStyleClass="add-place-select-overlay"
        [overlayOptions]="{ autoZIndex: true, baseZIndex: 4000 }"
      ></p-select>
    </div>

    <div class="form-group">
      <label for="cityId">Città <span class="required-asterisk">*</span></label>
      <input pInputText id="cityId" formControlName="city" placeholder="es. Roma" [fluid]="true" />
    </div>
  </div>

  <div class="form-group">
    <label for="descriptionId">Descrizione <span class="required-asterisk">*</span></label>
    <p-editor
      formControlName="description"
      id="descriptionId"
      [style]="{ height: '150px' }"
      placeholder="Descrivi questo luogo..."
    >
      <ng-template #header>
        <span class="ql-formats">
          <button
            type="button"
            class="ql-bold"
            aria-label="Grassetto"
            pTooltip="Grassetto"
            tooltipPosition="top"
          ></button>
          <button
            type="button"
            class="ql-italic"
            aria-label="Corsivo"
            pTooltip="Corsivo"
            tooltipPosition="top"
          ></button>
          <button
            type="button"
            class="ql-underline"
            aria-label="Sottolineato"
            pTooltip="Sottolineato"
            tooltipPosition="top"
          ></button>
        </span>

        <span class="ql-formats">
          <button
            type="button"
            class="ql-list"
            value="ordered"
            aria-label="Elenco numerato"
            pTooltip="Elenco numerato"
            tooltipPosition="top"
          ></button>
          <button
            type="button"
            class="ql-list"
            value="bullet"
            aria-label="Elenco puntato"
            pTooltip="Elenco puntato"
            tooltipPosition="top"
          ></button>
        </span>

        <span class="ql-formats" pTooltip="Allineamento" tooltipPosition="top">
          <select class="ql-align" aria-label="Allineamento">
            <option selected></option>
            <option value="center"></option>
            <option value="right"></option>
            <option value="justify"></option>
          </select>
        </span>

        <span class="ql-formats">
          <button
            type="button"
            class="ql-link"
            aria-label="Inserisci link"
            pTooltip="Inserisci link"
            tooltipPosition="top"
          ></button>
        </span>
      </ng-template>
    </p-editor>
  </div>

  <div class="form-group">
    <span class="form-label-title"> Immagine <span class="required-asterisk">*</span> </span>

    <p-fileupload
      mode="advanced"
      name="image"
      accept="image/jpeg,image/png,image/webp"
      [multiple]="false"
      [maxFileSize]="10000000"
      [fileLimit]="1"
      [showUploadButton]="false"
      [showCancelButton]="false"
      invalidFileSizeMessageSummary="File troppo grande"
      invalidFileSizeMessageDetail="La dimensione massima consentita è 10 MB."
      invalidFileTypeMessageSummary="Formato non supportato"
      invalidFileTypeMessageDetail="Sono accettati file JPG, PNG e WEBP."
      styleClass="image-uploader"
      (onSelect)="onPrimeFileSelected($event)"
      (onRemove)="onPrimeFileRemoved($event.file)"
    >
      <ng-template #header></ng-template>

      <ng-template
        #content
        let-files
        let-chooseCallback="chooseCallback"
        let-removeFileCallback="removeFileCallback"
        let-messages="messages"
      >
        @if (messages?.length) {
          <div class="upload-messages">
            @for (message of messages ?? []; track $index) {
              <p-message
                [severity]="message.severity"
                [text]="message.text"
                size="small"
              ></p-message>
            }
          </div>
        }

        <div class="upload-area">
          <button
            type="button"
            class="upload-dropzone"
            [disabled]="!!files?.length"
            [attr.aria-label]="
              files?.length ? 'Immagine selezionata' : 'Scegli o trascina un’immagine'
            "
            (click)="chooseCallback()"
          >
            <span class="upload-icon" aria-hidden="true">
              <i class="ph ph-upload-simple"></i>
            </span>

            @if (files?.length) {
              <span class="upload-filename">{{ files[0].name }}</span>
            } @else {
              <span class="upload-cta">Clicca o trascina qui</span>
            }

            <span class="upload-hint">JPG, PNG, WEBP — max 10 MB</span>
          </button>

          @if (files?.length) {
            <button
              pButton
              type="button"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              class="upload-remove"
              aria-label="Rimuovi immagine"
              pTooltip="Rimuovi immagine"
              tooltipPosition="top"
              (click)="removeFileCallback($event, 0)"
            >
              <i pButtonIcon class="ph ph-x" aria-hidden="true"></i>
            </button>
          }
        </div>
      </ng-template>
    </p-fileupload>
  </div>

  <footer class="form-footer">
    <p-button
      type="button"
      label="Annulla"
      severity="secondary"
      [outlined]="true"
      (onClick)="onAnnulla()"
    ></p-button>

    <p-button
      type="submit"
      icon="pi pi-plus"
      [label]="isSubmitting() ? 'Salvataggio...' : 'Aggiungi'"
      [loading]="isSubmitting()"
      [disabled]="placeForm.invalid || !selectedFile() || isSubmitting()"
    ></p-button>
  </footer>
</form>
