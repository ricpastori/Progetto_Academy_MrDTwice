<form [formGroup]="placeForm" (ngSubmit)="onSubmit()" class="add-place-form">
  <div class="category-selection">
    @for (cat of tagService.tags(); track cat.id) {
      <button
        type="button"
        (click)="selectCategory(cat.id)"
        [class.active-category]="placeForm.get('tag_id')?.value === cat.id"
        class="btn-category"
      >
        {{ cat.name }}
      </button>
    }
  </div>

  <div class="form-group">
    <label for="subCategoryId">Sotto-categoria <span class="required-asterisk">*</span></label>
    <p-select
      inputId="subCategoryId"
      [options]="filteredSubTags()"
      formControlName="sub_tag_id"
      [placeholder]="
        selectedTagId() ? 'Seleziona una sotto-categoria' : 'Scegli prima una categoria'
      "
      optionLabel="name"
      optionValue="id"
      styleClass="w-full"
    ></p-select>
  </div>

  <div class="form-row-grid-2">
    <div class="form-group">
      <label for="regionId">Regione <span class="required-asterisk">*</span></label>
      <p-select
        inputId="regionId"
        [options]="regionService.regions()"
        formControlName="region_id"
        placeholder="Seleziona regione"
        optionLabel="name"
        optionValue="id"
        styleClass="w-full"
      >
      </p-select>
    </div>

    <div class="form-group">
      <label for="cityId">Città <span class="required-asterisk">*</span></label>
      <input pInputText id="cityId" formControlName="city" placeholder="es. Roma" class="w-full" />
    </div>
  </div>

  <div class="form-group">
    <label for="placeId">Nome del Luogo <span class="required-asterisk">*</span></label>
    <input
      pInputText
      id="placeId"
      formControlName="place"
      placeholder="es. Colosseo"
      class="w-full"
    />
  </div>

  <div class="form-group">
    <label for="descriptionId">Descrizione <span class="required-asterisk">*</span></label>
    <p-editor
      formControlName="description"
      [style]="{ height: '180px' }"
      placeholder="Descrivi questo luogo in dettaglio..."
    ></p-editor>
  </div>

  <div class="form-group">
    <label for="hiddenFileInput"
      >Immagine (Obbligatoria) <span class="required-asterisk">*</span></label
    >
    <div
      role="button"
      tabindex="0"
      (click)="triggerFileInput()"
      (keydown)="onFileDropKeydown($event)"
      class="upload-dropzone"
    >
      <div class="upload-icon">
        <i class="pi pi-upload" aria-hidden="true"></i>
      </div>
      @if (!imagePreview()) {
        <p class="upload-cta">Clicca o trascina qui</p>
      } @else {
        <p class="upload-filename">{{ imagePreview() }}</p>
      }
      <p class="upload-hint">JPG, PNG, WEBP — max 10 MB</p>
    </div>
    <input
      type="file"
      id="hiddenFileInput"
      (change)="onFileSelected($event)"
      accept=".jpg,.jpeg,.png,.webp"
      style="display: none"
    />
  </div>

  <footer class="form-footer">
    <button
      pButton
      type="button"
      class="p-button-outlined p-button-secondary"
      (click)="onAnnulla()"
    >
      Annulla
    </button>
    <button
      pButton
      type="submit"
      [disabled]="placeForm.invalid || !selectedFile() || isSubmitting()"
      class="btn-submit"
    >
      @if (!isSubmitting()) {
        <i class="pi pi-plus" aria-hidden="true"></i>
      } @else {
        <i class="pi pi-spin pi-spinner" aria-hidden="true"></i>
      }
      <span>{{ isSubmitting() ? 'Salvataggio...' : 'Aggiungi' }}</span>
    </button>
  </footer>
</form>
